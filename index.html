<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 한국 주식 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <p class="date-display" id="date-display"></p>
        <h1>오늘의 추천 종목</h1>
        <div id="stocks-container" class="stocks-container"></div>
        <button id="generate-btn" class="generate-btn">새로운 추천 받기</button>

        <section class="contact-section">
            <hr class="divider">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xqegwbno" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>

        <section class="comments-section">
            <hr class="divider">
            <!-- LiveRe City install code -->
            <div id="lv-container" data-id="city" data-uid="YOUR_LIVERE_UID_HERE">
            <script type="text/javascript">
               (function(d, s) {
                   var j, e = d.getElementsByTagName(s)[0];

                   if (typeof LiveReData === 'function') { return; }

                   j = d.createElement(s);
                   j.src = 'https://cdn-city.livere.com/js/embed.dist.js';
                   j.async = true;

                   e.parentNode.insertBefore(j, e);
               })(document, 'script');
            </script>
            <noscript> 라이브리 댓글 작성을 위해 JavaScript를 활성화 해주세요 </noscript>
            </div>
            <!-- City install code end -->
        </section>
    </main>
    <script src="main.js" type="module"></script>
</body>
</html>
